            <h1>★ FNAFHS 📚 ACADEMY ★</h1>
        </div>
        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Inicio</span></a></li>
                <li class="nav-item"><a href="../index.html#personajes" class="nav-link"><i class="fas fa-user"></i><span>Personajes</span></a></li>

    </div>
</header>

<section class="arte-section">
    <div class="section-header">
        <h2 class="section-title">Arte</h2>
        <div class="filter-container-arte">
            <button class="filter-btn-arte" id="filterArteBtn"><span>🔍</span><span>Filtrar</span><span>▼</span></button>
            <div class="filter-panel-arte" id="filterArtePanel">
                <div class="filter-header"><h3>Filtros</h3><button class="close-filter-arte" id="closeArteFilter">✕</button></div>
                <div class="filter-group"><label>Categoría</label><select id="arteCategorySelect"><option value="todos">Todos</option><option value="arte-oficial">Arte Oficial</option><option value="comic">Cómics</option></select></div>
                <div class="filter-actions"><button class="apply-filter-arte" id="applyArteFilter">Aplicar</button><button class="reset-filter-arte" id="resetArteFilter">Resetear</button></div>
            </div>
        </div>

    <div class="arte-grid" id="arteGrid"></div>

<script src="../js/arte.js"></script>
<script>
    async function cargarLogo() {
        try {
            const response = await fetch(window.API_URL + '/api/logo/activo');
            const data = await response.json();
            const logoImg = document.getElementById('headerLogo');
            if (logoImg && data && data.imagenUrl) { logoImg.src = data.imagenUrl; logoImg.style.display = 'block'; }
        } catch(e) { console.error(e); }
    }
    const token = localStorage.getItem('authToken');
    if (token) {
        try {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            document.getElementById('navLogin').style.display = 'none';
            document.getElementById('navMiCuenta').style.display = 'block';
            if (userData.rol === 'ADMIN') document.getElementById('miCuentaLink').href = 'dashboard/admin.html';
            else if (userData.rol === 'SUBADMIN') document.getElementById('miCuentaLink').href = 'dashboard/subadmin.html';
            else document.getElementById('miCuentaLink').href = 'dashboard/user.html';
        } catch(e) {}
    }
    cargarLogo();
</script>
</body>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAFHS ACADEMY - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        window.API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8080'
            : 'https://fnafhs-academy-backend.onrender.com';
    </script>
    <style>
        .logo-circle {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            overflow: hidden;
        }
        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        body {
            padding-top: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(180deg, #4c0867 12%, #370505 40%);
        }
        .card {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-dark text-white text-center border-0 py-4">
                    <div class="logo-circle mb-3" id="logoContainer"></div>
                    <h3 class="mb-0 fw-bold">FNAFHS ACADEMY</h3>
                    <p class="text-warning small mb-0">Panel de Administración</p>
                </div>
                <div class="card-body p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-warning border-0"><i class="bi bi-person-fill"></i></span>
                                <input type="text" id="username" class="form-control border-0 bg-light" placeholder="Ingresa tu usuario" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-warning border-0"><i class="bi bi-key-fill"></i></span>
                                <input type="password" id="password" class="form-control border-0 bg-light" placeholder="Ingresa tu contraseña" required>
                                <button class="btn btn-outline-secondary border-0" type="button" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
                        </button>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 border-0">
                    <p class="mb-0 text-muted small">
                        ¿No tienes cuenta?
                        <a href="registro.html" class="text-warning fw-semibold text-decoration-none">Regístrate aquí</a>
                    </p>
                </div>
            </div>
            <div class="text-center mt-3">
                <small class="text-muted"><i class="bi bi-shield-check me-1 text-success"></i>Conexión segura</small>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }

    async function cargarLogo() {
        try {
            const response = await fetch(window.API_URL + '/api/logo/activo');
            const data = await response.json();
            const logoContainer = document.getElementById('logoContainer');
            if (logoContainer && data && data.imagenUrl) {
                logoContainer.innerHTML = `<img src="${data.imagenUrl}" alt="Logo">`;
            }
        } catch(e) {
            console.error('Error cargando logo:', e);
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        Swal.fire({title: 'Iniciando sesión...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
        
        try {
            const response = await fetch(window.API_URL + '/api/usuarios');
            const usuarios = await response.json();
            const usuario = usuarios.find(u => u.username === username && u.password === password && u.estado === 1);
            
            if (usuario) {
                localStorage.setItem('authToken', 'token-' + Date.now());
                localStorage.setItem('userData', JSON.stringify(usuario));
                
                let redirectUrl = '../index.html';
                if (usuario.rol === 'ADMIN') redirectUrl = 'dashboard/admin.html';
                else if (usuario.rol === 'SUBADMIN') redirectUrl = 'dashboard/subadmin.html';
                else redirectUrl = 'dashboard/user.html';
                
                Swal.fire({title: '¡Bienvenido!', text: `Hola ${usuario.nombreCompleto || usuario.username}`, icon: 'success', timer: 1500, showConfirmButton: false});
                setTimeout(() => { window.location.href = redirectUrl; }, 1500);
            } else {
                Swal.fire('Error', 'Usuario o contraseña incorrectos', 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'Error al conectar con el servidor', 'error');
        }
    });
    
    cargarLogo();
</script>
</body>
</html>
